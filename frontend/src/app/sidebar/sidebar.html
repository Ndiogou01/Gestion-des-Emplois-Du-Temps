<mat-sidenav-container class="h-screen">
  <mat-sidenav
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="sidenavOpen"
    class="relative flex flex-col min-h-screen shadow-lg bg-[#297EA6] text-white w-64"
  >

    <div class="flex items-center justify-center h-20 px-4 bg-[#297EA6]">
      <a href="" target="_blank" rel="noopener noreferrer" class="inline-block">
        <img
          src="/logo/logo.png"
          alt="Logo"
          class="h-12 w-12"
        />
      </a>
      <span class="ml-2 text-white font-light text-lg">TimeSchedule</span>
    </div>

    <div class="flex-1 px-2 overflow-auto pt-8 bg-[#297EA6]">
      <div class="mb-6">
        <h3 class="px-2 mb-3 text-xs font-semibold text-blue-100 uppercase tracking-wider text-center">
          Navigation
        </h3>
        <div class="space-y-1">
          <a mat-list-item href="javascript:void(0)" (click)="goToDashboard(); closeOnMobile()" 
             class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
            <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
            </svg>
            <span class="font-light">Tableau de bord</span>
          </a>  
          
          <a mat-list-item href="javascript:void(0)" (click)="goToGEDT(); closeOnMobile()" 
             class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
            <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a1 1 0 001-1V8H4v12a1 1 0 001 1z"/>
            </svg>
            <span class="font-light">Planification</span>
          </a>
          
          <a mat-list-item href="javascript:void(0)" (click)="goToPlanning(); closeOnMobile()" 
             class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
            <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
            </svg>
            <span class="font-light">Plannings</span>
          </a>
          
          <a mat-list-item href="javascript:void(0)" (click)="goToEnseignants(); closeOnMobile()" 
             class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
            <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span class="font-light">Enseignants</span>
          </a>
          
          <a mat-list-item href="javascript:void(0)" (click)="goToFiliere(); closeOnMobile()" 
             class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
            <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            <span class="font-light">Filières</span>
          </a>
          
          <a mat-list-item href="javascript:void(0)" (click)="goToSalle(); closeOnMobile()" 
             class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
            <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span class="font-light">Salles</span>
          </a>
          
          <a mat-list-item href="javascript:void(0)" (click)="goToCours(); closeOnMobile()" 
             class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
            <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            <span class="font-light">Cours</span>
          </a>
          
          <a mat-list-item href="javascript:void(0)" (click)="goToFiliereCours(); closeOnMobile()" 
             class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
            <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            <span class="font-light">Filière & Cours</span>
          </a>

          <div>
            <h3 class="px-2 mt-12 mb-3 text-xs font-semibold text-blue-100 uppercase tracking-wider text-center">
              Profil
            </h3>
            <a mat-list-item href="javascript:void(0)" (click)="goToEditProfile(); closeOnMobile()" 
               class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-[#24698f]">
              <svg class="h-5 w-5 text-blue-100 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <span class="font-light">Modifier profil</span>
            </a>
            <a mat-list-item (click)="logout(); closeOnMobile()" 
               class="flex items-center gap-3 py-3 px-2 cursor-pointer rounded-lg transition-all duration-200 hover:bg-red-500/20">
              <svg class="h-5 w-5 text-red-300 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
              </svg>
              <span class="font-light">Se déconnecter</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </mat-sidenav>
  
<mat-sidenav-content class="relative">

    <header class="sticky top-0 z-40 bg-white border-b border-gray-200 px-4 sm:px-6 py-4 flex items-center justify-between shadow-sm">
      <div class="flex items-center gap-4 flex-1">

        <button
          mat-icon-button
          (click)="toggleSidenav()"
          class="text-gray-600 hover:text-[#297EA6] hover:bg-blue-50 rounded-full p-2 transition-colors lg:hidden"
          aria-label="Toggle sidebar"
        >
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
          <div class="h-10 w-10 flex items-center justify-center rounded-full text-white text-sm font-semibold uppercase bg-[#297EA6]">
            {{ getInitials() }}
          </div>
          <div class="text-sm">
            <div class="font-medium text-gray-900">{{ userName }}</div>
            <div class="text-gray-500">Administrateur</div>
          </div>
        </div>
      </div>
    </header>
    
    <main class="p-4 sm:p-6 bg-gray-50 min-h-[calc(100vh-73px)]">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
