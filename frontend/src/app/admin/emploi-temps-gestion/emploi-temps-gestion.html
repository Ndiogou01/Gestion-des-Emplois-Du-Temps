<div class="p-4 sm:p-6 max-w-7xl mx-auto space-y-4 sm:space-y-6">
  
  <app-planning-hebdomadaire (planningChange)="onPlanningChange($event)"></app-planning-hebdomadaire>
  
  <app-filter-panel-admin 
    (filterChange)="onFilterChange($event)" 
    (creneauxFiltres)="onCreneauxFiltres($event)">
  </app-filter-panel-admin>

  <app-planning-grid
    *ngIf="selectedFiliere"
    [creneaux]="filteredCreneaux"
    [coursList]="coursList"
    [enseignants]="enseignants"
    [salles]="salles"
    (caseClick)="openCreneauForm(null, $event.jour, $event.heure)"
    (creneauClick)="openCreneauForm($event.creneau)"
  ></app-planning-grid>

  <div *ngIf="!selectedFiliere" class="bg-blue-50 border-l-4 border-gray-500 p-3 sm:p-4 mb-4">
    <div class="flex">
      <div class="flex-shrink-0">
        <svg class="h-5 w-5 text-gray-700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2h-1V9z" clip-rule="evenodd" />
        </svg>
      </div>
      <div class="ml-3">
        <p class="text-sm text-gray-700">
          Aucun planning actif. Cliquez sur 
          <span class="font-semibold text-[#002233]">« Nouveau planning »</span> 
          pour sélectionner une filière, un semestre et définir la période.
        </p>
      </div>
    </div>
  </div>

  <app-creneau-form
    *ngIf="formVisible && planningHebdoId !== null"
    [creneau]="selectedCreneau!"
    [filiere]="(selectedFiliere ?? '').toString()"
    [semestre]="(selectedSemestre ?? '').toString()"
    [planningHebdomadaireId]="planningHebdoId"
    [coursList]="coursList"
    [enseignants]="enseignants"
    [salles]="salles"
    (saveEvent)="onSave($event)"
    (delete)="onDelete($event)"
    (cancel)="closeForm()"
    (conflict)="handleConflict()"
  ></app-creneau-form>

  <div *ngIf="showDeleteConfirmModal" 
    class="fixed inset-0 bg-gradient-to-br from-black/60 to-gray-900/70 backdrop-blur-sm flex items-center justify-center z-50 p-3 sm:p-4 animate-in fade-in duration-300">

    <div class="bg-white rounded-xl sm:rounded-2xl p-4 sm:p-6 md:p-8 max-w-md w-full mx-2 sm:mx-0 shadow-xl sm:shadow-2xl transform animate-in slide-in-from-bottom-4 zoom-in-95 duration-300 border border-gray-100">
      <div class="flex justify-center mb-4 sm:mb-6">
        <div class="w-12 h-12 sm:w-16 sm:h-16 bg-red-100 rounded-full flex items-center justify-center">
          <svg class="w-6 h-6 sm:w-8 sm:h-8 text-red-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </div>
      </div>
      <p class="text-gray-600 mb-4 sm:mb-6 text-center leading-relaxed text-sm sm:text-base">
        Voulez-vous vraiment supprimer ce créneau ? 
        <span class="block mt-1 sm:mt-2 text-xs sm:text-sm text-red-500 font-medium">
          Cette action est irréversible.
        </span>
      </p>
      <div class="flex flex-col xs:flex-row gap-2 sm:gap-3">
        <button (click)="closeDeleteModal()" 
                class="flex-1 px-3 sm:px-4 py-2.5 sm:py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300">
          Annuler
        </button>
        
        <button (click)="confirmDelete()" 
                class="flex-1 px-3 sm:px-4 py-2.5 sm:py-2 bg-red-600 text-white rounded-lg text-sm font-medium transition-all duration-200 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500">
          Confirmer
        </button>
      </div>
    </div>
  </div>

  <!-- <div class="flex flex-col sm:flex-row sm:justify-end gap-3 sm:space-x-4 mt-4 sm:mt-6">
    <button (click)="savePlanning()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded w-full sm:w-auto">
      Enregistrer
    </button>
    <button (click)="validatePlanning()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded w-full sm:w-auto">
      Valider
    </button>
  </div> -->
</div>
