<div class="p-6 bg-white rounded-lg shadow-sm border border-gray-200">
  <h2 class="text-xl font-semibold text-gray-900 mb-6">Progression par filière</h2>

  <div class="mb-8">
    <label class="block text-sm font-medium text-gray-700 mb-2">Filière</label>
    <select 
        [(ngModel)]="selectedFiliereId"
        (change)="onFiliereChange()"
        class="w-full px-4 py-3 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#002233] focus:border-[#002233] appearance-none bg-white transition-all duration-200 hover:border-gray-400 cursor-pointer"
    >
        <option [ngValue]="null" class="text-gray-400">-- Sélectionnez une filière --</option>
        <option *ngFor="let f of filieres" [ngValue]="f.id" class="text-gray-900">
        {{ f.nomFiliere }}
        </option>
    </select>
  </div>
  
  <div *ngIf="coursProgression.length > 0" class="space-y-4">
    <div *ngFor="let cours of coursProgression" class="p-5 bg-gray-50 rounded-lg border border-gray-200 hover:shadow-sm transition-shadow">
      <div class="flex items-start justify-between mb-3">
        <h3 class="font-semibold text-gray-900 text-base">{{ cours.nomCours }} ({{ cours.typeDeCours }})</h3>
        <span class="text-sm font-medium text-[#002233] bg-blue-50 px-2 py-1 rounded-full">
          {{ getProgressPercent(cours) }}%
        </span>
      </div>
      
      <div class="flex justify-between items-center mb-3">
        <div class="text-sm">
          <span class="text-gray-600">Volume effectué:</span>
          <span class="font-medium text-gray-900 ml-1">{{ cours.volumeHoraireEffectue }}h</span>
        </div>
        <div class="text-sm text-gray-500">
          <span class="text-gray-600">Volume total:</span>
          <span class="font-medium text-gray-900 ml-1">{{ cours.volumeHoraireTotal }}h</span>
        </div>
      </div>
      
      <div class="w-full bg-gray-200 rounded-full h-2.5">
        <div 
          class="bg-[#002233] h-2.5 rounded-full transition-all duration-500 ease-out" 
          [style.width.%]="getProgressPercent(cours)">
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="coursProgression.length === 0 && selectedFiliereId" class="text-center py-12 bg-gray-50 rounded-lg border border-gray-200">
    <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
    </svg>
    <p class="text-gray-500 text-sm">Aucun cours disponible pour cette filière</p>
  </div>
</div>
