<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4 sm:mb-6">
  <div class="flex-1 min-w-0">
    <h1 class="text-xl sm:text-2xl font-bold text-[#002233] leading-tight">
      Planning de la semaine du {{ formattedDateRange }}
    </h1>
    
    <div class="flex flex-col xs:flex-row xs:items-center gap-2 sm:gap-4 mt-2 text-sm text-gray-600">
      <div class="flex items-center gap-2">
        <span class="font-medium whitespace-nowrap">Filière:</span>
        <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs sm:text-sm truncate max-w-[150px] xs:max-w-[200px] sm:max-w-none">
          {{ getSelectedFiliereName() || 'Aucune sélectionnée' }}
        </span>
      </div>
      
      <div class="flex items-center gap-2">
        <span class="font-medium whitespace-nowrap">Semestre:</span>
        <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs sm:text-sm">
          {{ selectedSemestre || 'Aucun' }}
        </span>
      </div>
    </div>
  </div>
  
  <button 
    (click)="openNewPlanningModal()"
    class="px-3 sm:px-4 py-2 bg-[#002233] text-white text-sm font-medium rounded-lg hover:bg-[#001a29] transition-colors flex items-center justify-center gap-2 w-full sm:w-auto order-first sm:order-last"
  >
    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
    </svg>
    <span class="whitespace-nowrap">Nouveau planning</span>
  </button>
</div>

<div *ngIf="showNewPlanningModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-3 sm:p-4">
  <div class="bg-white rounded-lg p-4 sm:p-6 w-full max-w-md mx-2 sm:mx-4 max-h-[90vh] overflow-y-auto">
    <h2 class="text-lg sm:text-xl font-bold mb-4 text-[#002233]">Créer un nouveau planning</h2>
    
    <div class="space-y-3 sm:space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Filière:</label>
        <select
          [(ngModel)]="modalSelectedFiliere"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#002233] bg-white"
        >
          <option value="" disabled selected>Sélectionner une filière</option>
          <option *ngFor="let f of filieres" [ngValue]="f.id">
            {{ f.nomFiliere }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Semestre:</label>
        <select
          [(ngModel)]="modalSelectedSemestre"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#002233] bg-white"
        >
          <option value="" disabled selected>Sélectionner un semestre</option>
          <option *ngFor="let s of semestres" [value]="s">
            {{ s }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date de début:</label>
        <input 
          type="date" 
          [(ngModel)]="newStartDate"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#002233] bg-white"
        >
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date de fin:</label>
        <input 
          type="date" 
          [(ngModel)]="newEndDate"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 sm:py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#002233] bg-white"
        >
      </div>
    </div>
    
    <div class="flex flex-col xs:flex-row justify-end gap-2 sm:gap-3 mt-4 sm:mt-6">
      <button 
        (click)="closeNewPlanningModal()"
        class="px-4 py-2.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors text-sm order-2 xs:order-1"
      >
        Annuler
      </button>
      <button 
        (click)="createNewPlanning()"
        class="px-4 py-2.5 bg-[#002233] text-white rounded-lg hover:bg-[#001a29] transition-colors text-sm order-1 xs:order-2"
      >
        Créer
      </button>
    </div>
  </div>
</div>
