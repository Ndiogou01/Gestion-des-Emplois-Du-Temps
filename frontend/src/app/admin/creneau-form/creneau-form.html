<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-3 sm:p-4">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md max-h-[90vh] overflow-y-auto mx-2 sm:mx-0">
    <!-- Header -->
    <div class="border-b border-gray-200 p-4 sm:p-6">
      <h2 class="text-lg sm:text-xl font-semibold text-gray-900">
        {{ creneau?.id ? 'Modifier un créneau' : 'Ajouter un nouveau créneau' }}
      </h2>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSave()" class="p-4 sm:p-6 space-y-4 sm:space-y-4">
      <!-- Message de conflit -->
      <div *ngIf="conflictMessage" class="p-3 sm:p-4 bg-red-100 border border-red-400 text-red-700 rounded mb-3 sm:mb-4 text-sm">
        {{ conflictMessage }}
      </div>      
      
      <!-- Date -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
        <input 
          type="date"
          [(ngModel)]="creneau.date" 
          name="date" 
          class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md shadow-sm"
          required
        />
      </div>

      <!-- Heures -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Heure de début</label>
          <input 
            type="time" 
            [(ngModel)]="creneau.heureDebut" 
            name="heureDebut"
            min="07:00" max="20:00"
            step="900"  
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md shadow-sm"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Heure de fin</label>
          <input 
            type="time" 
            [(ngModel)]="creneau.heureFin" 
            name="heureFin" 
            min="07:00" max="20:00"
            step="900"  
            class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md shadow-sm"
            required
          />
        </div>
      </div>

      <!-- Cours -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Cours</label>
        <select 
          [(ngModel)]="creneau.coursId" 
          name="coursId" 
          class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md shadow-sm"
          required
        >
          <option *ngFor="let cours of coursList" [value]="cours.id">
            {{ cours.nomCours }} - Responsable {{ cours.typeDeCours }} : {{ getEnseignantNom(cours.enseignantResponsableId) }}
          </option>
        </select>
      </div>

      <!-- Enseignant -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Enseignant</label>
        <select 
          [(ngModel)]="creneau.enseignantId" 
          name="enseignantId" 
          class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md shadow-sm"
          required
        >
          <option *ngFor="let enseignant of enseignants" [value]="enseignant.id">
            {{ enseignant.prenomEnseignant }} {{ enseignant.nomEnseignant }}
          </option>
        </select>
      </div>
      
      <!-- Salle -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Salle</label>
        <select 
          [(ngModel)]="creneau.salleId" 
          name="salleId" 
          class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md shadow-sm"
          required
        >
          <option *ngFor="let salle of salles" [value]="salle.id">
            {{ salle.nomSalle }}
          </option>
        </select>
      </div>
      
      <!-- Actions - Layout identique au desktop -->
      <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200">
        <button 
          type="button" 
          (click)="cancel.emit()" 
          class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
        >
          Annuler
        </button>
        
        <button 
          *ngIf="creneau?.id"
          type="button" 
          (click)="deleteCreneau()" 
          class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700"
        >
          Supprimer
        </button>
        
        <button 
          type="submit" 
          class="px-4 py-2 text-sm font-medium text-white bg-[#002233] rounded-md hover:bg-[#0573a6]"
        >
          {{ creneau?.id ? 'Mettre à jour' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
