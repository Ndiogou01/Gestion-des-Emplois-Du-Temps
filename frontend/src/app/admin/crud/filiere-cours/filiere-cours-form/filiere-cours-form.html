<div class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-3 sm:p-4">
  <div class="bg-white rounded-lg w-full max-w-md max-h-[90vh] overflow-y-auto mx-2 sm:mx-0">
    <!-- Header -->
    <div class="px-4 sm:px-6 py-4 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-gray-900">
        {{ filiereCours?.id ? 'Modifier' : 'Ajouter' }} une association
      </h2>
    </div>
    
    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="p-4 sm:p-6 space-y-4 sm:space-y-6">
      <!-- Filière -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Filière
        </label>
        <select 
          [(ngModel)]="formFiliereCours.filiereId" 
          name="filiere_id" 
          required 
          class="w-full px-3 sm:px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002233] focus:border-transparent">
          <option [value]="null" disabled>-- Sélectionnez une filière --</option>
          <option *ngFor="let f of filieres" [value]="f.id">{{ f.nomFiliere }}</option>
        </select>
      </div>
      
      <!-- Cours -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Cours
        </label>
        <select 
          [(ngModel)]="formFiliereCours.coursId" 
          name="coursId" 
          required 
          class="w-full px-3 sm:px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002233] focus:border-transparent">
          <option [value]="null" disabled>-- Sélectionnez un cours --</option>
          <option *ngFor="let c of cours" [value]="c.id">{{ c.nomCours }} ({{ c.typeDeCours }})</option>
        </select>
      </div>
      
      <!-- Volume horaire -->
      <div class="w-full">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Volume total (h)
        </label>
        <input 
          type="number" 
          [(ngModel)]="formFiliereCours.volumeHoraireTotal" 
          name="volume_horaire_total" 
          min="0" 
          required 
          class="w-full px-3 sm:px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#002233] focus:border-transparent"
          placeholder="0" />
      </div>
      
      <!-- Actions -->
      <div class="flex flex-col-reverse xs:flex-row xs:justify-end gap-3 pt-4 border-t border-gray-100">
        <button
          type="button"
          (click)="cancel.emit()"
          class="px-4 py-2.5 xs:py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors w-full xs:w-auto order-1">
          Annuler
        </button>
        <button
          type="submit"
          class="px-4 py-2.5 xs:py-2 text-sm font-medium text-white bg-gray-900 rounded-lg hover:bg-gray-800 transition-colors w-full xs:w-auto order-2">
          {{ filiereCours?.id ? 'Mettre à jour' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
