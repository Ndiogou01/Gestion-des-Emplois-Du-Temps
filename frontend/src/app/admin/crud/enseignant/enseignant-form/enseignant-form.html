<div class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-3 sm:p-4">
  <div class="bg-white rounded-lg w-full max-w-md max-h-[90vh] overflow-y-auto mx-2 sm:mx-0">
    <!-- Header -->
    <div class="px-4 sm:px-6 py-4 border-b border-gray-100">
      <h2 class="text-lg font-medium text-gray-900">
        {{ enseignant?.id ? 'Modifier' : 'Ajouter' }} un enseignant
      </h2>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="p-4 sm:p-6 space-y-4 sm:space-y-5">
      <!-- Nom et Prénom -->
      <div class="grid grid-cols-1 xs:grid-cols-2 gap-3 sm:gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-900 mb-2">
            Nom
          </label>
          <input 
            [(ngModel)]="formEnseignant.nomEnseignant" 
            name="nom_enseignant" 
            required 
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
            placeholder="Nom" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-900 mb-2">
            Prénom
          </label>
          <input 
            [(ngModel)]="formEnseignant.prenomEnseignant" 
            name="prenom_enseignant" 
            required 
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
            placeholder="Prénom" />
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-900 mb-2">
          Email
        </label>
        <input 
          [(ngModel)]="formEnseignant.emailEnseignant" 
          name="email_enseignant" 
          type="email" 
          required 
          class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
          placeholder="email@université.fr" />
      </div>

      <!-- Département et Spécialité -->
      <div class="grid grid-cols-1 gap-3 sm:gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-900 mb-2">
            Département
          </label>
          <input 
            [(ngModel)]="formEnseignant.departement" 
            name="departement" 
            required 
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
            placeholder="Département" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-900 mb-2">
            Spécialité
          </label>
          <input 
            [(ngModel)]="formEnseignant.specialite" 
            name="specialite" 
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
            placeholder="Spécialité (optionnel)" />
        </div>
      </div>

      <!-- Actions -->
      <div class="flex flex-col-reverse xs:flex-row xs:justify-end gap-3 pt-4 border-t border-gray-100">
        <button
          type="button"
          (click)="cancel.emit()"
          class="px-4 py-2.5 xs:py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors w-full xs:w-auto order-1">
          Annuler
        </button>
        <button
          type="submit"
          class="px-4 py-2.5 xs:py-2 text-sm font-medium text-white bg-gray-900 rounded-lg hover:bg-gray-800 transition-colors w-full xs:w-auto order-2">
          {{ enseignant?.id ? 'Mettre à jour' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
