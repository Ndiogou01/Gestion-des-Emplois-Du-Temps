<header class="fixed top-0 left-0 w-full bg-[#297EA6] shadow-lg z-50">
  <div class="max-w-7xl mx-auto flex items-center justify-between h-14 sm:h-16 px-3 xs:px-4 sm:px-6 lg:px-8">
    
    <div class="flex items-center">
      
      <div class="flex items-center">
        <div class="transition-transform duration-300 hover:rotate-12">
          <a href="" rel="noopener noreferrer" class="inline-block">
            <img src="/logo/logo.png" alt="Logo" class="h-8 w-8 sm:h-10 sm:w-10 md:h-12 md:w-12 mr-2 sm:mr-3" />
          </a>
        </div>
        <span class="hidden sm:inline text-white font-extralight text-base md:text-lg lg:text-xl">
          TimeSchedule
        </span>
      </div>
    </div>

    <div class="flex-1 text-center mx-2 sm:mx-4">
      <span class="text-sm xs:text-base sm:text-lg md:text-xl font-light text-white tracking-wide whitespace-nowrap overflow-hidden text-ellipsis">
        GESTION DES EMPLOIS DU TEMPS
      </span>
    </div>

    <div class="flex items-center">
      <button
        (click)="navigateToLogin()"
        class="bg-white text-[#297EA6] hover:bg-blue-50 font-medium py-1.5 xs:py-2 px-3 xs:px-4 sm:px-5 rounded-full transition-all duration-300 flex items-center hover:shadow-lg text-xs xs:text-sm sm:text-base"
      >
        <svg class="w-3 h-3 xs:w-4 xs:h-4 mr-1 xs:mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
        </svg>
        <span class="hidden xs:inline">Se connecter</span>
        <span class="xs:hidden">Connexion</span>
      </button>
    </div>
  </div>
</header>
<div class="pt-14 sm:pt-16"></div>
